version: '3.8'

services:
  # 1. BỘ NÃO: GOM DỮ LIỆU
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    restart: unless-stopped

  # 2. ĐÔI MẮT: VẼ BIỂU ĐỒ
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000" # Nhớ kiểm tra xem port 3000 có bị Frontend tranh mất không nhé, nếu trùng đổi thành 3001:3000
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  # 3. CẢM BIẾN MÁY CHỦ: ĐO CPU, RAM của hệ điều hành Ubuntu
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"

  # 4. CẢM BIẾN DOCKER: ĐO CPU, RAM của từng Container (Game, User, Chat...)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  # 5. LÍNH GÁC: Ping liên tục và Bắn cảnh báo Telegram
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "3002:3001"
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  uptime_kuma_data:
